name: Financial Major Event Alerts

on:
  push:
    branches:
      - main
    paths:
      - "scripts/financial_brief.py"
      - "tests/test_financial_brief.py"
      - ".github/workflows/financial-alerts.yml"
      - "requirements*.txt"
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch: {}

jobs:
  monitor-alerts:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Run tests
        run: python -m pytest tests/test_financial_brief.py -q

      - name: Send alert monitor update
        run: python scripts/financial_brief.py --mode alert
