name: Financial Brief

on:
  schedule:
    # Beijing 08:00, 15:00, 21:30. GitHub cron uses UTC.
    - cron: "0 0 * * *"
    - cron: "0 7 * * *"
    - cron: "30 13 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "Brief mode"
        required: true
        default: "morning"
        type: choice
        options:
          - morning
          - afternoon
          - night

jobs:
  send-brief:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Run tests
        run: python -m pytest tests/test_financial_brief.py -q

      - name: Choose scheduled mode
        id: mode
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ inputs.mode }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.schedule }}" = "0 0 * * *" ]; then
            echo "mode=morning" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.schedule }}" = "0 7 * * *" ]; then
            echo "mode=afternoon" >> "$GITHUB_OUTPUT"
          else
            echo "mode=night" >> "$GITHUB_OUTPUT"
          fi

      - name: Send Telegram brief
        run: python scripts/financial_brief.py --mode "${{ steps.mode.outputs.mode }}"
